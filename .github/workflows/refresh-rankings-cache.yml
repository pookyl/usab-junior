name: Refresh Rankings Cache

on:
  schedule:
    # Run daily at 08:00 UTC (midnight PST / 3am EST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Refresh rankings cache
        id: refresh
        run: |
          set +e
          node scripts/refresh-rankings-cache.mjs
          status=$?
          if [ "$status" -eq 0 ]; then
            echo "refresh_state=updated" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -eq 2 ]; then
            echo "refresh_state=no_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit "$status"

      - name: Check if any cache files changed
        id: check
        run: |
          git add data/rankings-*.json data/rankings-cache.json data/rankings-meta.json 2>/dev/null || true
          if git diff --cached --quiet 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated cache
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DATE=$(jq -r .date data/rankings-cache.json)
          git commit -m "chore: add rankings for ${DATE}"
          git push
